<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COORIONARA 珂莉安 — Korean Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════
       DESIGN TOKENS — matches spec v1.0
    ══════════════════════════════════════ */
    :root {
      --bg:       #F8F5F0;   /* Off-White */
      --bg-soft:  #EFE7DC;   /* Soft Beige */
      --beige:    #E0D4C3;   /* borders / dividers */
      --pink:     #F2D9D0;   /* Baby Pink */
      --pink-dk:  #E4C5BB;   /* hover / darker pink */
      --brown:    #8B6F5E;   /* Muted Brown — titles, borders */
      --brown-dk: #5A3D2E;   /* hover dark brown */
      --dark:     #2C1F14;   /* Warm Charcoal — body text */
      --mid:      #7A6858;   /* secondary text */
      --gold:     #B8935A;   /* ingredients accent */
      --white:    #FDFAF6;   /* near-white cards */

      --sans:    'DM Sans', system-ui, sans-serif;
      --serif-ko: 'Noto Serif KR', serif;
      --serif-zh: 'Noto Serif SC', 'Noto Serif TC', serif;
      --max: 1320px;
      --nav-h: 68px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    /* Language-level font switching */
    body.lang-ko  { font-family: var(--serif-ko); }
    body.lang-ko  .nav-logo,
    body.lang-ko  .lang-btn,
    body.lang-ko  .btn-primary,
    body.lang-ko  .btn-ghost,
    body.lang-ko  .hero-h1,
    body.lang-ko  .section-h2,
    body.lang-ko  .feat-h3,
    body.lang-ko  .contact-h2,
    body.lang-ko  .footer-logo,
    body.lang-ko  .stat-num,
    body.lang-ko  .ing-stat,
    body.lang-ko  .mobile-menu-links a { font-family: var(--sans); }

    body.lang-zh-cn { font-family: var(--serif-zh); }
    body.lang-zh-cn .nav-logo,
    body.lang-zh-cn .lang-btn,
    body.lang-zh-cn .btn-primary,
    body.lang-zh-cn .btn-ghost,
    body.lang-zh-cn .hero-h1,
    body.lang-zh-cn .section-h2,
    body.lang-zh-cn .feat-h3,
    body.lang-zh-cn .contact-h2,
    body.lang-zh-cn .footer-logo,
    body.lang-zh-cn .stat-num,
    body.lang-zh-cn .ing-stat,
    body.lang-zh-cn .mobile-menu-links a { font-family: var(--sans); }

    body.lang-zh-tw { font-family: 'Noto Serif TC', 'Noto Serif SC', serif; }
    body.lang-zh-tw .nav-logo,
    body.lang-zh-tw .lang-btn,
    body.lang-zh-tw .btn-primary,
    body.lang-zh-tw .btn-ghost,
    body.lang-zh-tw .hero-h1,
    body.lang-zh-tw .section-h2,
    body.lang-zh-tw .feat-h3,
    body.lang-zh-tw .contact-h2,
    body.lang-zh-tw .footer-logo,
    body.lang-zh-tw .stat-num,
    body.lang-zh-tw .ing-stat,
    body.lang-zh-tw .mobile-menu-links a { font-family: var(--sans); }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    /* ── Layout ── */
    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
    }

    /* ── Placeholder boxes ── */
    .ph {
      background: var(--bg-soft);
      position: relative;
      overflow: hidden;
    }
    .ph::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg,
        var(--beige) 0%,
        rgba(242,217,208,0.6) 55%,
        var(--pink) 100%);
      opacity: 0.5;
    }
    .ph-label {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      z-index: 2;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown);
      background: rgba(248,245,240,0.88);
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }

    .divider { width: 36px; height: 1px; background: var(--beige); margin: 1.5rem 0; }

    /* ── Real product images ── */
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8%;
      background: var(--white);
      display: block;
      transition: transform 0.4s ease;
    }
    .product-card:hover .product-img img { transform: scale(1.06); }
    .product-img img.portrait-img { padding: 4%; }
    .feat-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 14%;
      background: var(--white);
      display: block;
    }
    .hero-product-img {
      width: 100%;
      height: 100%;
      min-height: 640px;
      object-fit: cover;
      object-position: right center;
      display: block;
    }

    /* ══════════════════════════════════════
       NAVIGATION
    ══════════════════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }
    nav.scrolled {
      background: rgba(248,245,240,0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 var(--beige);
    }
    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }
    .nav-logo {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dark);
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      flex: 1;
      justify-content: center;
    }
    .nav-links a {
      font-size: 11.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--dark); }

    .lang-switcher {
      display: flex;
      align-items: center;
      border: 1px solid var(--beige);
      border-radius: 999px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .lang-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--mid);
      background: transparent;
      border: none;
      padding: 0.45rem 0.9rem;
      transition: background 0.18s, color 0.18s;
    }
    .lang-btn.active { background: var(--dark); color: var(--white); }
    .lang-btn:not(.active):hover { background: var(--bg-soft); color: var(--dark); }

    /* Hamburger */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding: 6px;
      background: none;
      border: none;
      width: 38px;
      height: 38px;
    }
    .nav-hamburger span {
      display: block;
      height: 1.5px;
      background: var(--dark);
      border-radius: 2px;
      transition: transform 0.3s ease, opacity 0.2s ease;
      transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* Mobile menu overlay */
    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 190;
      background: var(--bg);
      padding: calc(var(--nav-h) + 3rem) clamp(1.5rem, 6vw, 3rem) 3rem;
      flex-direction: column;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .mobile-menu.open { opacity: 1; }
    .mobile-menu-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      margin-bottom: 3rem;
    }
    .mobile-menu-links a {
      font-family: var(--sans);
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--dark);
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .mobile-menu-links a:hover { color: var(--brown); border-color: var(--beige); }
    .mobile-lang-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .mobile-lang-btn {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 0.55rem 1.2rem;
      border: 1px solid var(--beige);
      border-radius: 999px;
      background: transparent;
      color: var(--mid);
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .mobile-lang-btn.active {
      background: var(--dark);
      color: var(--white);
      border-color: var(--dark);
    }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    .hero {
      padding-top: var(--nav-h);
      min-height: 100svh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .hero-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(4rem, 8vw, 8rem) clamp(1.5rem, 4vw, 4rem) clamp(4rem, 8vw, 8rem) clamp(2rem, 6vw, 6rem);
      position: relative;
      z-index: 5;
    }
    .hero-eyebrow {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 2rem;
    }
    .hero-h1 {
      font-family: var(--sans);
      font-size: clamp(3.2rem, 5.5vw, 6.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--dark);
      margin-bottom: 0;
    }
    .hero-h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--brown);
    }
    .hero-sub {
      font-size: clamp(0.88rem, 1.1vw, 1rem);
      color: var(--mid);
      max-width: 380px;
      line-height: 1.88;
      margin-top: 2rem;
      margin-bottom: 3rem;
    }
    .hero-cta-row {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    /* CTA Buttons */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--dark);
      color: var(--white);
      font-family: var(--sans);
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      padding: 1rem 2.2rem;
      border-radius: 999px;
      border: 1px solid var(--dark);
      transition: background 0.22s, border-color 0.22s;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--brown-dk); border-color: var(--brown-dk); }
    .btn-pink {
      background: var(--pink);
      color: var(--brown);
      border-color: var(--pink);
    }
    .btn-pink:hover { background: var(--pink-dk); border-color: var(--pink-dk); color: var(--brown-dk); }
    .btn-ghost {
      font-family: var(--sans);
      font-size: 11.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      border-bottom: 1px solid var(--beige);
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--dark); }

    .hero-image { position: relative; }
    .hero-image > .ph {
      height: 100%;
      min-height: 640px;
    }
    /* Centered placeholder label for hero */
    .hero-ph-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brown);
      opacity: 0.65;
      text-align: center;
      line-height: 2.2;
      pointer-events: none;
    }

    .hero-badge {
      position: absolute;
      bottom: 3rem;
      left: -3rem;
      z-index: 10;
      background: var(--white);
      border: 1px solid var(--beige);
      padding: 1.2rem 1.6rem;
      border-radius: 1.2rem;
      min-width: 152px;
      box-shadow: 0 8px 36px rgba(44,31,20,0.1);
    }
    .hero-badge-num {
      font-family: var(--sans);
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1;
    }
    .hero-badge-num sup { font-size: 0.9rem; }
    .hero-badge-label {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown);
      margin-top: 0.45rem;
    }
    .hero-scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: clamp(2rem, 6vw, 6rem);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
      z-index: 5;
    }
    .hero-scroll-hint::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--beige);
    }

    /* ══════════════════════════════════════
       TICKER
    ══════════════════════════════════════ */
    .ticker {
      background: var(--dark);
      color: rgba(248,245,240,0.65);
      padding: 0.9rem 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker-track {
      display: inline-flex;
      animation: ticker 36s linear infinite;
    }
    .ticker-item {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding: 0 2rem;
    }
    .ticker-dot {
      display: inline-block;
      width: 3px;
      height: 3px;
      background: var(--pink);
      border-radius: 50%;
      vertical-align: middle;
      flex-shrink: 0;
      align-self: center;
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ══════════════════════════════════════
       SECTION COMMONS
    ══════════════════════════════════════ */
    section { padding: clamp(5rem, 10vw, 10rem) 0; }
    .section-kicker {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 0.85rem;
    }
    .section-h2 {
      font-family: var(--sans);
      font-size: clamp(2rem, 3.5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--dark);
    }
    .section-h2 em {
      font-style: italic;
      font-weight: 300;
      color: var(--brown);
    }
    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: clamp(3rem, 5vw, 5rem);
      gap: 2rem;
    }
    .link-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--sans);
      font-size: 11.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      border-bottom: 1px solid var(--beige);
      padding-bottom: 2px;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .link-arrow:hover { color: var(--dark); }

    /* ══════════════════════════════════════
       BRAND STORY
    ══════════════════════════════════════ */
    .story { background: var(--bg-soft); }
    .story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(3rem, 6vw, 7rem);
      align-items: center;
    }
    .story-quote {
      font-family: var(--sans);
      font-size: clamp(1.5rem, 2.6vw, 2.5rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.42;
      color: var(--dark);
      margin: 1.5rem 0;
    }
    .story-quote strong {
      font-style: normal;
      font-weight: 700;
      color: var(--brown);
    }
    .story-body {
      font-size: 0.94rem;
      color: var(--mid);
      line-height: 1.92;
      max-width: 440px;
    }
    .story-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 2rem;
    }
    .kw-tag {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brown);
      border: 1px solid var(--beige);
      padding: 0.4rem 1rem;
      border-radius: 999px;
    }
    .story-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--beige);
      border: 1px solid var(--beige);
      margin-top: 2.5rem;
    }
    .stat-cell { background: var(--bg-soft); padding: 1.5rem; }
    .stat-num {
      font-family: var(--sans);
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--dark);
      line-height: 1;
    }
    .stat-num sup { font-size: 0.85rem; font-weight: 500; }
    .stat-desc {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brown);
      margin-top: 0.4rem;
    }
    /* Overlapping image layout */
    .story-image-wrap {
      position: relative;
      padding-bottom: 3rem;
    }
    .story-img-main {
      aspect-ratio: 3/4;
      border-radius: 3px;
      overflow: hidden;
    }
    .story-img-main > .ph { height: 100%; }
    .story-img-main img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: 62% center;
      display: block;
    }
    @keyframes story-float {
      0%   { transform: translateY(0px) rotate(-1deg); box-shadow: 0 8px 32px rgba(44,31,20,0.12); }
      50%  { transform: translateY(-10px) rotate(-1deg); box-shadow: 0 18px 40px rgba(44,31,20,0.18); }
      100% { transform: translateY(0px) rotate(-1deg); box-shadow: 0 8px 32px rgba(44,31,20,0.12); }
    }
    .story-img-detail {
      position: absolute;
      bottom: 0;
      left: -2rem;
      width: 52%;
      border: 4px solid var(--white);
      border-radius: 3px;
      overflow: hidden;
      transform: rotate(-1deg);
      animation: story-float 4s ease-in-out infinite;
      transition: transform .3s ease;
    }
    .story-img-detail:hover {
      animation-play-state: paused;
      transform: translateY(-6px) rotate(0deg) scale(1.03);
      box-shadow: 0 20px 48px rgba(44,31,20,0.22);
    }
    .story-img-detail > .ph { aspect-ratio: 1/1; }
    .story-img-detail img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 8%;
      background: var(--white);
      display: block;
    }

    /* Editorial banner — hanji concept */
    .editorial-banner {
      margin: 5rem 0 0;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }
    .editorial-banner img {
      width: 100%;
      display: block;
      max-height: 520px;
      object-fit: cover;
      object-position: center 40%;
    }
    .editorial-banner-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem clamp(1.5rem, 4vw, 3rem);
      background: linear-gradient(to top, rgba(44,31,20,0.55) 0%, transparent 100%);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }
    .editorial-caption-left { flex: 1; }
    .editorial-caption-num {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--pink);
      margin-bottom: 0.35rem;
    }
    .editorial-caption-title {
      font-family: var(--sans);
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.04em;
    }
    .editorial-caption-right {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(248,245,240,0.65);
      text-align: right;
      white-space: nowrap;
    }

    /* ══════════════════════════════════════
       PRODUCTS
    ══════════════════════════════════════ */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .product-card { cursor: pointer; }
    .product-img {
      aspect-ratio: 3/4;
      border-radius: 3px;
      margin-bottom: 1.2rem;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .product-card:hover .product-img { transform: scale(1.02); }
    .product-img > .ph { height: 100%; }
    .product-meta { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .product-name { font-size: 0.94rem; font-weight: 500; color: var(--dark); margin-bottom: 0.3rem; }
    .product-sub  { font-size: 11.5px; color: var(--mid); }
    .product-tag {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--brown);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .product-tag.new { background: var(--pink); color: var(--brown); }

    .products-feature {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .feat-img { border-radius: 3px; overflow: hidden; }
    .feat-img > .ph { aspect-ratio: 16/9; }
    .feat-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 4vw, 3rem);
      background: var(--bg-soft);
      border-radius: 3px;
    }
    .feat-h3 {
      font-family: var(--sans);
      font-size: clamp(1.35rem, 2.2vw, 1.9rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--dark);
      margin-bottom: 1rem;
    }
    .feat-body { font-size: 0.9rem; color: var(--mid); line-height: 1.88; margin-bottom: 2rem; }

    /* ══════════════════════════════════════
       INGREDIENTS
    ══════════════════════════════════════ */
    .ingredients { background: var(--dark); color: var(--bg); }
    .ingredients .section-kicker { color: var(--pink); }
    .ingredients .section-h2   { color: var(--bg); }
    .ingredients .section-h2 em { color: var(--pink); }
    .ingredients .link-arrow { color: var(--gold); border-color: rgba(184,147,90,0.4); }
    .ingredients .link-arrow:hover { color: var(--white); }

    .ing-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 2.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      gap: 2rem;
    }
    .ing-row:last-child { border-bottom: 1px solid rgba(255,255,255,0.07); }
    .ing-name {
      font-family: var(--sans);
      font-size: clamp(1.5rem, 2.8vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--bg);
    }
    .ing-name em {
      font-style: italic;
      font-weight: 300;
      font-size: 0.68em;
      color: var(--gold);
    }
    .ing-stat {
      font-family: var(--sans);
      font-size: clamp(2rem, 4.5vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--pink);
      text-align: center;
      white-space: nowrap;
    }
    .ing-stat small {
      font-size: 0.32em;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      vertical-align: super;
    }
    .ing-desc-wrap { text-align: right; }
    .ing-origin {
      display: inline-block;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(184,147,90,0.35);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 0.6rem;
    }
    .ing-desc {
      font-size: 0.82rem;
      color: rgba(248,245,240,0.48);
      line-height: 1.82;
      max-width: 280px;
      margin-left: auto;
    }

    /* ══════════════════════════════════════
       COMPANY NEWS
    ══════════════════════════════════════ */
    .news { background: var(--bg-soft); }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      align-items: start;
    }
    .news-card-img > .ph,
    .news-card-img > img {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 3px;
      margin-bottom: 1.2rem;
      object-fit: cover;
      display: block;
    }
    .news-card--featured .news-card-img > .ph,
    .news-card--featured .news-card-img > img { aspect-ratio: 3/2; }
    .news-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.65rem; }
    .news-cat {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown);
    }
    .news-date { font-family: var(--sans); font-size: 11px; color: var(--mid); }
    .news-title {
      font-size: 0.97rem;
      font-weight: 500;
      color: var(--dark);
      line-height: 1.42;
      margin-bottom: 0.55rem;
    }
    .news-card--featured .news-title { font-size: clamp(1rem, 1.6vw, 1.28rem); }
    .news-excerpt { font-size: 0.83rem; color: var(--mid); line-height: 1.78; }

    /* ══════════════════════════════════════
       CONTACT
    ══════════════════════════════════════ */
    .contact-strip { background: var(--pink); padding: clamp(3.5rem, 6vw, 6rem) 0; }
    .contact-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 3rem;
    }
    .contact-h2 {
      font-family: var(--sans);
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--dark);
    }
    .contact-h2 em {
      font-style: italic;
      font-weight: 300;
      color: var(--brown);
    }
    .contact-details { display: flex; flex-direction: column; gap: 0.5rem; text-align: right; }
    .contact-label { font-family: var(--sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); }
    .contact-email { font-size: 0.9rem; color: var(--dark); }
    .contact-icons { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1rem; }
    .contact-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(44,31,20,0.1);
      color: var(--brown);
      font-size: 17px;
      transition: background 0.2s;
    }
    .contact-icon-btn:hover { background: rgba(44,31,20,0.2); }

    .contact-form {
      margin-top: 3rem;
      display: grid;
      gap: 1rem;
      max-width: 640px;
    }
    .contact-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      font-family: var(--sans);
      font-size: 0.88rem;
      padding: 0.9rem 1.1rem;
      border: 1px solid rgba(44,31,20,0.18);
      border-radius: 8px;
      background: var(--white);
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }
    .contact-form input:focus,
    .contact-form textarea:focus { border-color: var(--brown); }
    .contact-form textarea { min-height: 120px; resize: vertical; font-family: inherit; }
    .contact-form button[type="submit"] {
      justify-self: start;
      border: none;
      cursor: pointer;
    }
    .contact-form-status {
      font-family: var(--sans);
      font-size: 0.82rem;
      min-height: 1.2em;
    }
    .contact-form-status.success { color: #4B7A4B; }
    .contact-form-status.error   { color: #B3543F; }
    @media (max-width: 560px) {
      .contact-form-row { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      background: var(--dark);
      color: rgba(248,245,240,0.48);
      padding: clamp(3rem, 6vw, 5.5rem) 0 2rem;
    }
    .footer-inner {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 3rem;
      margin-bottom: 3rem;
    }
    .footer-logo {
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 0.9rem;
    }
    .footer-tagline { font-style: italic; font-size: 0.88rem; color: var(--gold); margin-bottom: 1rem; line-height: 1.65; }
    .footer-desc { font-size: 12px; line-height: 1.88; }
    .footer-col-title {
      font-family: var(--sans);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 1.2rem;
    }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
    .footer-links a { font-size: 12px; color: rgba(248,245,240,0.48); transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-family: var(--sans);
      font-size: 11px;
    }
    .footer-lang-bar { display: flex; gap: 1.5rem; }
    .footer-lang-bar a { font-size: 11px; color: rgba(248,245,240,0.38); transition: color 0.2s; }
    .footer-lang-bar a:hover,
    .footer-lang-bar a.active { color: var(--gold); }

    /* ══════════════════════════════════════
       SCROLL ANIMATIONS
    ══════════════════════════════════════ */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
      will-change: opacity, transform;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.1s; }
    .reveal-d2 { transition-delay: 0.2s; }
    .reveal-d3 { transition-delay: 0.3s; }
    .reveal-d4 { transition-delay: 0.4s; }

    /* Lang fade */
    [data-i18n], [data-i18n-html] { transition: opacity 0.15s ease; }
    body.lang-switching [data-i18n],
    body.lang-switching [data-i18n-html] { opacity: 0; }

    /* Mobile menu display fix */
    .mobile-menu.open { display: flex; opacity: 1; }

    /* ══════════════════════════════════════
       RESPONSIVE — 1024px (tablet)
    ══════════════════════════════════════ */
    @media (max-width: 1024px) {
      /* Hero: 이미지 위 → 텍스트 아래 세로 스택 */
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: 100svh;
      }
      .hero-image {
        display: block;
        order: -1;
        height: calc(100svh - var(--nav-h));
        min-height: 480px;
        max-height: 760px;
        overflow: hidden;
      }
      .hero-product-img {
        min-height: unset !important;
        height: 100%;
        width: 100%;
        object-fit: cover;
        object-position: right top;
        padding: 0;
        background: none;
      }
      .hero-badge { display: none; }
      .hero-scroll-hint { display: none; }
      .hero-text {
        min-height: auto;
        padding: 2.5rem clamp(1.5rem, 6vw, 3rem) 3.5rem;
        justify-content: flex-start;
      }
      .hero-text::before { display: none; }

      .story-grid { grid-template-columns: 1fr; }
      .story-image-wrap { display: none; }

      .footer-inner { grid-template-columns: 1fr 1fr; gap: 2rem; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — 768px (mobile)
    ══════════════════════════════════════ */
    @media (max-width: 768px) {
      .nav-links, .lang-switcher { display: none; }
      .nav-hamburger { display: flex; }

      .products-grid { grid-template-columns: 1fr 1fr; }
      .products-feature { grid-template-columns: 1fr; }
      .feat-img > .ph { aspect-ratio: 4/3; }

      .ing-row { grid-template-columns: 1fr 1fr; }
      .ing-desc-wrap { display: none; }

      .news-grid { grid-template-columns: 1fr; max-width: 480px; }

      .contact-inner { grid-template-columns: 1fr; }
      .contact-details { text-align: left; }
      .contact-icons { justify-content: flex-start; }

      .footer-inner { grid-template-columns: 1fr 1fr; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — 480px (small mobile)
    ══════════════════════════════════════ */
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr; max-width: 300px; margin: 0 auto; }
      .footer-inner { grid-template-columns: 1fr; }
      .footer-bottom { flex-direction: column; align-items: flex-start; }
      .footer-lang-bar { flex-wrap: wrap; gap: 1rem; }
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(44,31,20,.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; animation: lb-fade .2s ease; }
    @keyframes lb-fade { from { opacity:0 } to { opacity:1 } }
    #lightbox-img {
      max-width: min(88vw, 520px);
      max-height: 78vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 32px 80px rgba(0,0,0,.45);
      pointer-events: none;
      animation: lb-scale .22s cubic-bezier(.22,1,.36,1);
    }
    @keyframes lb-scale { from { transform:scale(.92); opacity:0 } to { transform:scale(1); opacity:1 } }
    #lightbox-caption {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #FDFAF6;
      white-space: nowrap;
      pointer-events: none;
    }
    #lightbox-caption .lb-name { font-size: 1rem; font-weight: 500; }
    #lightbox-caption .lb-size { font-size: .82rem; opacity: .65; margin-top: .25rem; }
    #lightbox-close {
      position: absolute;
      top: 1.25rem; right: 1.5rem;
      background: none; border: none;
      color: #FDFAF6; font-size: 1.75rem;
      line-height: 1; cursor: pointer;
      opacity: .7; transition: opacity .15s; padding: .25rem;
    }
    #lightbox-close:hover { opacity: 1; }
    .product-card { cursor: zoom-in; }
  </style>
</head>

function buildTicker(lang) {
  const items = T[lang]['ticker'];
  const doubled = [...items, ...items];
  return doubled.map(t =>
    `<span class="ticker-item">${t}</span><span class="ticker-dot"></span>`
  ).join('');
}

function applyLang(lang) {
  const dict = T[lang];
  if (!dict) return;
  document.body.classList.add('lang-switching');
  setTimeout(() => {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (dict[k] !== undefined) el.textContent = dict[k];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const k = el.getAttribute('data-i18n-html');
      if (dict[k] !== undefined) el.innerHTML = dict[k];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const k = el.getAttribute('data-i18n-placeholder');
      if (dict[k] !== undefined) el.placeholder = dict[k];
    });
    document.getElementById('ticker-track').innerHTML = buildTicker(lang);

    // html lang attr
    const htmlLang = { en:'en', ko:'ko', 'zh-cn':'zh-CN', 'zh-tw':'zh-TW' };
    document.documentElement.lang = htmlLang[lang] || lang;

    // "All Updates →" link should open news.html in the same language
    const newsAllLink = document.getElementById('news-all-link');
    if (newsAllLink) newsAllLink.href = 'news.html?lang=' + lang;

    // footer lang bar active state
    document.querySelectorAll('.footer-lang-bar a').forEach(a =>
      a.classList.toggle('active', a.getAttribute('data-lang') === lang));

    document.body.classList.remove('lang-switching');
  }, 150);
}

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;

  // body font class
  document.body.className = document.body.className
    .replace(/\blang-\S+/g, '').trim() + ' lang-' + lang;

  // nav + mobile buttons
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  document.querySelectorAll('.mobile-lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang));

  applyLang(lang);
  renderNews(lang);

  // Persist preference
  const url = new URL(window.location);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url);
}

/* ══════════════════════════════════════════════════════════════
   COMPANY NEWS — rendered dynamically from news-data.json
   To add/update/remove news items, edit news-data.json directly —
   no code changes needed. Note: fetch() requires the site to be
   served over http(s); it will fail silently under file://.
══════════════════════════════════════════════════════════════ */
let newsItems = null;
let newsRenderedOnce = false;
const NEWS_LANG_FIELD = { en: 'en', ko: 'ko', 'zh-cn': 'zh', 'zh-tw': 'zh_tw' };
const NEWS_MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatNewsDate(dateStr, lang) {
  const parts = (dateStr || '').split('-').map(Number);
  const y = parts[0], m = parts[1];
  if (!y || !m) return dateStr || '';
  if (lang === 'ko') return `${y}년 ${m}월`;
  if (lang === 'zh-cn' || lang === 'zh-tw') return `${y}年${m}月`;
  return `${NEWS_MONTHS_EN[m - 1]} ${y}`;
}

function handleNewsImgError(img) {
  const ph = document.createElement('div');
  ph.className = 'ph';
  ph.innerHTML = '<span class="ph-label">Image</span>';
  img.replaceWith(ph);
}
window.handleNewsImgError = handleNewsImgError;

function newsCardHTML(item, lang) {
  const f = NEWS_LANG_FIELD[lang] || 'en';
  const cat     = item['category_' + f] || item.category_en || '';
  const title   = item['title_' + f]    || item.title_en    || '';
  const summary = item['summary_' + f]  || item.summary_en  || '';
  const dateLabel = formatNewsDate(item.date, lang);
  const isFeatured = !!item.featured;
  const imgHTML = item.thumbnail
    ? `<img src="${item.thumbnail}" alt="" loading="lazy" onerror="handleNewsImgError(this)">`
    : `<div class="ph"><span class="ph-label">Image</span></div>`;
  return `
    <div class="news-card${isFeatured ? ' news-card--featured' : ''} reveal">
      <div class="news-card-img">${imgHTML}</div>
      <div class="news-meta">
        <span class="news-cat">${cat}</span>
        <span class="news-date">${dateLabel}</span>
      </div>
      <h3 class="news-title">${title}</h3>
      <p class="news-excerpt">${summary}</p>
    </div>`;
}

function renderNews(lang) {
  const grid = document.getElementById('news-grid');
  if (!grid || !newsItems) return;
  const sorted = [...newsItems].sort((a, b) => {
    if (!!a.featured !== !!b.featured) return a.featured ? -1 : 1;
    return new Date(b.date) - new Date(a.date);
  });
  grid.innerHTML = sorted.map(item => newsCardHTML(item, lang)).join('');
  grid.querySelectorAll('.reveal').forEach(el => {
    // After the first render, the news section has already had its
    // chance to animate in — re-renders from a language switch should
    // just appear, not replay the fade/slide-up.
    if (newsRenderedOnce) el.classList.add('visible');
    else observeReveal(el);
  });
  newsRenderedOnce = true;
}

function loadNews(lang) {
  // news-data.js is loaded via a plain <script> tag (see just above this
  // <script> block), so it works whether the page is opened via file://
  // (double-click) or http(s) — no fetch() / CORS restriction involved.
  newsItems = Array.isArray(window.NEWS_DATA) ? window.NEWS_DATA : [];
  if (!newsItems.length) {
    console.warn('[news] window.NEWS_DATA is empty or missing — check that news-data.js is present and loaded before this script.');
  }
  renderNews(lang);
}

/* ══════════════════════════════════════════════════════════════
   CONTACT FORM — submits to Web3Forms (https://web3forms.com).
   Static sites (like this one on GitHub Pages) have no backend, so
   Web3Forms relays the submission to the configured email address
   (currently coorionara@coorionara.top). Access Key is set on the
   form's hidden "access_key" input above. To rotate the key, get a
   new one at web3forms.com and swap it in.
══════════════════════════════════════════════════════════════ */
(function initContactForm() {
  const form = document.getElementById('contact-form');
  if (!form) return;
  const status = document.getElementById('contact-form-status');
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const dict = T[currentLang] || T.en;
    const accessKey = form.access_key.value;

    if (!accessKey || accessKey === 'YOUR_WEB3FORMS_ACCESS_KEY') {
      status.textContent = dict['contact.form.error'];
      status.className = 'contact-form-status error';
      console.warn('[contact-form] Web3Forms access_key is not set — replace YOUR_WEB3FORMS_ACCESS_KEY with your own key from web3forms.com.');
      return;
    }

    submitBtn.disabled = true;
    status.textContent = dict['contact.form.sending'];
    status.className = 'contact-form-status';

    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify(Object.fromEntries(new FormData(form)))
    })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          status.textContent = dict['contact.form.success'];
          status.className = 'contact-form-status success';
          form.reset();
        } else {
          throw new Error(data.message || 'submission failed');
        }
      })
      .catch(err => {
        console.warn('[contact-form] submission failed:', err);
        status.textContent = dict['contact.form.error'];
        status.className = 'contact-form-status error';
      })
      .finally(() => {
        submitBtn.disabled = false;
      });
  });
})();

// Wire up all lang-switching controls
document.querySelectorAll('.lang-btn, .mobile-lang-btn').forEach(btn => {
  btn.addEventListener('click', () => switchLang(btn.getAttribute('data-lang')));
});
document.querySelectorAll('.footer-lang-bar a').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); switchLang(a.getAttribute('data-lang')); });
});

/* ══════════════════════════════════════════════════════════════
   MOBILE MENU
══════════════════════════════════════════════════════════════ */
const hamburger   = document.getElementById('hamburger');
const mobileMenu  = document.getElementById('mobile-menu');

function closeMenu() {
  hamburger.classList.remove('open');
  mobileMenu.classList.remove('open');
  mobileMenu.setAttribute('aria-hidden', 'true');
}

hamburger.addEventListener('click', () => {
  const isOpen = hamburger.classList.toggle('open');
  mobileMenu.classList.toggle('open', isOpen);
  mobileMenu.setAttribute('aria-hidden', String(!isOpen));
});

document.addEventListener('click', e => {
  if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) closeMenu();
});

/* ══════════════════════════════════════════════════════════════
   SCROLL REVEAL — IntersectionObserver
   observeReveal() is exposed globally so elements injected after
   page load (e.g. dynamically rendered news cards) can hook in too.
══════════════════════════════════════════════════════════════ */
function observeReveal(el) {
  if (window.__revealObserver) {
    window.__revealObserver.observe(el);
  } else {
    el.classList.add('visible');
  }
}

(function () {
  const revealEls = document.querySelectorAll('.reveal');
  if (!('IntersectionObserver' in window)) {
    revealEls.forEach(el => el.classList.add('visible'));
    return;
  }
  window.__revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        window.__revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  revealEls.forEach(el => window.__revealObserver.observe(el));
})();

/* ══════════════════════════════════════════════════════════════
   NAV SCROLL STATE — scrollY > 40px → nav.scrolled
══════════════════════════════════════════════════════════════ */
const mainNav = document.getElementById('main-nav');
function handleNavScroll() {
  mainNav.classList.toggle('scrolled', window.scrollY > 40);
}
window.addEventListener('scroll', handleNavScroll, { passive: true });
handleNavScroll();

/* ══════════════════════════════════════════════════════════════
   INITIAL LANGUAGE DETECTION
   Default language is English. The only override is an explicit
   URL ?lang= param (e.g. ?lang=ko) — browser language is ignored.
══════════════════════════════════════════════════════════════ */
function detectInitialLang() {
  const supported = ['en', 'ko', 'zh-cn', 'zh-tw'];
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && supported.includes(urlLang.toLowerCase())) {
    return urlLang.toLowerCase();
  }
  return 'en';
}

(function initLang() {
  const lang = detectInitialLang();
  currentLang = lang;
  document.body.className = document.body.className
    .replace(/\blang-\S+/g, '').trim() + ' lang-' + lang;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  document.querySelectorAll('.mobile-lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  applyLang(lang);
  loadNews(lang);
})();

/* ── Lightbox ── */
(function () {
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('lightbox').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-close').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  // Document-wide so both product cards (#products) and other triggers
  // (e.g. the Contact section's TikTok/RedNote QR icons) can use data-lb-img.
  document.addEventListener('click', e => {
    const card = e.target.closest('[data-lb-img]');
    if (card) {
      e.preventDefault(); // avoid href="#" jumping the page when the trigger is a link
      openLightbox(card.dataset.lbImg);
    }
  });
}());
</script>
