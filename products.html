<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — COORIONARA 珂莉安</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg:      #F8F5F0;
      --bg-soft: #EFE7DC;
      --beige:   #E0D4C3;
      --pink:    #F2D9D0;
      --pink-dk: #E4C5BB;
      --brown:   #8B6F5E;
      --brown-dk:#5A3D2E;
      --dark:    #2C1F14;
      --mid:     #7A6858;
      --gold:    #B8935A;
      --white:   #FDFAF6;
      --sans:    'DM Sans', system-ui, sans-serif;
      --serif-ko:'Noto Serif KR', serif;
      --serif-zh:'Noto Serif SC', 'Noto Serif TC', serif;
      --max:     1320px;
      --nav-h:   68px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    body.lang-ko  { font-family: var(--serif-ko); }
    body.lang-ko  .nav-logo, body.lang-ko .lang-btn,
    body.lang-ko  .btn-primary, body.lang-ko .page-h1,
    body.lang-ko  .series-name, body.lang-ko .filter-btn { font-family: var(--sans); }
    body.lang-zh-cn { font-family: var(--serif-zh); }
    body.lang-zh-cn .nav-logo, body.lang-zh-cn .lang-btn,
    body.lang-zh-cn .btn-primary, body.lang-zh-cn .page-h1,
    body.lang-zh-cn .series-name, body.lang-zh-cn .filter-btn { font-family: var(--sans); }
    body.lang-zh-tw { font-family: 'Noto Serif TC', serif; }
    body.lang-zh-tw .nav-logo, body.lang-zh-tw .lang-btn,
    body.lang-zh-tw .btn-primary, body.lang-zh-tw .page-h1,
    body.lang-zh-tw .series-name, body.lang-zh-tw .filter-btn { font-family: var(--sans); }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200; height: var(--nav-h);
      transition: background .35s, box-shadow .35s;
    }
    nav.scrolled {
      background: rgba(248,245,240,.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 var(--beige);
    }
    .nav-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 2rem;
    }
    .nav-logo {
      font-family: var(--sans); font-size: 13px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--dark);
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; flex: 1; justify-content: center; }
    .nav-links a {
      font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--mid); transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--dark); }
    .lang-switcher {
      display: flex; align-items: center;
      border: 1px solid var(--beige); border-radius: 999px; overflow: hidden;
    }
    .lang-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      letter-spacing: .06em; color: var(--mid); background: transparent;
      border: none; padding: .45rem .9rem; transition: background .18s, color .18s;
    }
    .lang-btn.active { background: var(--dark); color: var(--white); }
    .lang-btn:not(.active):hover { background: var(--bg-soft); color: var(--dark); }
    .nav-hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; padding: 6px; background: none; border: none; width: 38px; height: 38px;
    }
    .nav-hamburger span {
      display: block; height: 1.5px; background: var(--dark); border-radius: 2px;
      transition: transform .3s, opacity .2s; transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 190; background: var(--bg);
      padding: calc(var(--nav-h) + 3rem) clamp(1.5rem,6vw,3rem) 3rem;
      flex-direction: column; justify-content: center; opacity: 0; transition: opacity .3s;
    }
    .mobile-menu.open { opacity: 1; }
    .mobile-menu-links { list-style: none; display: flex; flex-direction: column; gap: 1.8rem; margin-bottom: 3rem; }
    .mobile-menu-links a {
      font-family: var(--sans); font-size: clamp(2rem,8vw,2.8rem); font-weight: 700;
      letter-spacing: -.02em; color: var(--dark); transition: color .2s;
    }
    .mobile-lang-row { display: flex; gap: .75rem; flex-wrap: wrap; }
    .mobile-lang-btn {
      font-family: var(--sans); font-size: 12px; letter-spacing: .08em;
      padding: .55rem 1.2rem; border: 1px solid var(--beige); border-radius: 999px;
      background: transparent; color: var(--mid); transition: background .18s, color .18s, border-color .18s;
    }
    .mobile-lang-btn.active { background: var(--dark); color: var(--white); border-color: var(--dark); }

    /* ── PAGE HERO ── */
    .page-hero {
      padding-top: calc(var(--nav-h) + 4rem);
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--beige);
    }
    .page-kicker {
      font-family: var(--sans); font-size: 10px; letter-spacing: .24em;
      text-transform: uppercase; color: var(--brown); margin-bottom: .8rem;
    }
    .page-h1 {
      font-family: var(--sans); font-size: clamp(2.2rem, 4vw, 3.8rem);
      font-weight: 900; letter-spacing: -.03em; line-height: 1.05; color: var(--dark);
    }
    .page-h1 em { font-style: italic; font-weight: 300; color: var(--brown); }
    .page-sub {
      font-size: .9rem; color: var(--mid); margin-top: 1rem; max-width: 480px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: sticky; top: var(--nav-h); z-index: 100;
      background: rgba(248,245,240,.96); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--beige);
      padding: 0 clamp(1.5rem,5vw,4rem);
    }
    .filter-inner {
      max-width: var(--max); margin: 0 auto;
      display: flex; gap: 0; overflow-x: auto;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .filter-inner::-webkit-scrollbar { display: none; }
    .filter-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; color: var(--mid);
      background: transparent; border: none;
      padding: 1rem 1.4rem; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: color .2s, border-color .2s;
    }
    .filter-btn:hover { color: var(--dark); }
    .filter-btn.active { color: var(--brown); border-bottom-color: var(--brown); }

    /* ── SERIES SECTION ── */
    .series-section { padding: clamp(3.5rem,6vw,6rem) 0; border-bottom: 1px solid var(--beige); }
    .series-section:last-child { border-bottom: none; }
    .series-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: clamp(2rem,4vw,3.5rem); gap: 2rem; }
    .series-meta {}
    .series-label {
      font-family: var(--sans); font-size: 10px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--brown); margin-bottom: .5rem;
    }
    .series-name {
      font-family: var(--sans); font-size: clamp(1.6rem,2.8vw,2.6rem);
      font-weight: 700; letter-spacing: -.02em; line-height: 1.1; color: var(--dark);
    }
    .series-name em { font-style: italic; font-weight: 300; color: var(--brown); }
    .series-count {
      font-family: var(--sans); font-size: 11px; letter-spacing: .08em;
      color: var(--mid); margin-top: .4rem;
    }

    /* ── PRODUCT GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(1rem, 2vw, 1.5rem);
    }
    .product-card { cursor: pointer; }
    .product-img {
      aspect-ratio: 1/1; border-radius: 4px; overflow: hidden;
      margin-bottom: 1rem; background: #EFE7DC;
      transition: box-shadow .3s;
    }
    .product-card:hover .product-img { box-shadow: 0 8px 28px rgba(44,31,20,.1); }
    .product-img img {
      width: 100%; height: 100%; object-fit: contain;
      padding: 6%; display: block;
      transition: transform .4s ease;
    }
    .product-card:hover .product-img img { transform: scale(1.05); }
    .product-img img.portrait-img { padding: 2%; }
    /* fallback placeholder if no image */
    .product-img.no-img {
      background: linear-gradient(145deg, var(--bg-soft) 0%, var(--pink) 100%);
    }
    .product-name {
      font-size: .9rem; font-weight: 600; color: var(--dark);
      line-height: 1.35; margin-bottom: .3rem;
    }
    .product-cn {
      font-size: 11.5px; color: var(--mid); margin-bottom: .4rem;
    }
    .product-desc {
      font-size: 11.5px; color: var(--mid); line-height: 1.65;
    }
    .product-size {
      display: inline-block; font-family: var(--sans); font-size: 10px;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--brown); border: 1px solid var(--beige);
      padding: .2rem .65rem; border-radius: 999px; margin-top: .5rem;
    }

    /* ── BACK LINK ── */
    .back-bar { padding: 2rem 0; border-top: 1px solid var(--beige); margin-top: 2rem; }
    .back-link {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--sans); font-size: 11.5px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--mid);
      border-bottom: 1px solid var(--beige); padding-bottom: 2px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--dark); }

    /* ── FOOTER ── */
    footer {
      background: var(--dark); color: rgba(248,245,240,.48);
      padding: clamp(2.5rem,5vw,4rem) 0 1.5rem;
    }
    .footer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
      font-family: var(--sans); font-size: 11px;
    }
    .footer-lang-bar { display: flex; gap: 1.5rem; }
    .footer-lang-bar a { font-size: 11px; color: rgba(248,245,240,.38); transition: color .2s; }
    .footer-lang-bar a:hover, .footer-lang-bar a.active { color: var(--gold); }
    .footer-logo-wrap { margin-bottom: 1.5rem; }
    .footer-logo {
      font-family: var(--sans); font-size: 13px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--white);
    }
    .footer-tagline { font-style: italic; font-size: .85rem; color: var(--gold); margin-top: .3rem; }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .55s ease, transform .55s ease; will-change: opacity, transform; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: .08s; }
    .reveal-d2 { transition-delay: .16s; }
    .reveal-d3 { transition-delay: .24s; }

    /* ── LANG SWITCH ── */
    [data-i18n], [data-i18n-html] { transition: opacity .15s; }
    body.lang-switching [data-i18n], body.lang-switching [data-i18n-html] { opacity: 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .products-grid { grid-template-columns: repeat(3, 1fr); }
      .nav-links, .lang-switcher { display: none; }
      .nav-hamburger { display: flex; }
    }
    @media (max-width: 768px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-btn { padding: .85rem 1rem; font-size: 10px; }
      .series-header { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: .75rem; }
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(44,31,20,.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      animation: lb-fade-in .2s ease;
    }
    #lightbox.open { display: flex; }
    @keyframes lb-fade-in { from { opacity:0 } to { opacity:1 } }

    /* Panel: 2-column card */
    #lightbox-panel {
      display: flex;
      max-width: min(92vw, 900px);
      width: 100%;
      max-height: 88vh;
      background: var(--white);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,.5);
      cursor: default;
      animation: lb-scale-in .22s cubic-bezier(.22,1,.36,1);
    }
    @keyframes lb-scale-in { from { transform:scale(.94); opacity:0 } to { transform:scale(1); opacity:1 } }

    /* Left: image column */
    .lb-img-wrap {
      width: 40%;
      min-width: 40%;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      flex-shrink: 0;
    }
    #lightbox-img {
      max-width: 100%;
      max-height: calc(88vh - 5rem);
      object-fit: contain;
      display: block;
    }

    /* Right: detail column */
    #lightbox-detail {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem 2.2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    #lightbox-detail::-webkit-scrollbar { width: 4px; }
    #lightbox-detail::-webkit-scrollbar-thumb { background: var(--beige); border-radius: 4px; }

    .lb-series-badge {
      display: inline-block;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brown);
      background: var(--bg-soft);
      padding: .25rem .7rem;
      border-radius: 20px;
      width: fit-content;
    }
    #lb-name {
      font-family: var(--sans);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.3;
      margin-top: .1rem;
    }
    #lb-size-tag {
      font-size: .8rem;
      color: var(--mid);
      letter-spacing: .04em;
    }
    #lb-tagline {
      font-size: .97rem;
      color: var(--brown);
      font-style: italic;
      line-height: 1.55;
      border-left: 3px solid var(--pink);
      padding-left: .9rem;
    }
    .lb-section-title {
      font-family: var(--sans);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: .5rem;
    }
    #lb-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    #lb-features li {
      font-size: .9rem;
      color: var(--dark);
      padding-left: 1rem;
      position: relative;
      line-height: 1.55;
    }
    #lb-features li::before {
      content: '';
      position: absolute;
      left: 0; top: .65em;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
    }
    #lb-ingredients {
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }
    .lb-ing-item { font-size: .88rem; line-height: 1.5; }
    .lb-ing-name {
      font-weight: 600;
      color: var(--brown-dk);
    }
    .lb-ing-benefit { color: var(--mid); }
    #lb-usage {
      font-size: .88rem;
      color: var(--mid);
      line-height: 1.65;
    }
    .lb-divider {
      border: none;
      border-top: 1px solid var(--bg-soft);
      margin: 0;
    }

    /* Close button */
    #lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      background: rgba(255,255,255,.15);
      border: none;
      color: #FDFAF6;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      opacity: .8;
      transition: opacity .15s;
      padding: .35rem .5rem;
      border-radius: 6px;
      z-index: 1;
    }
    #lightbox-close:hover { opacity: 1; background: rgba(255,255,255,.25); }

    /* Mobile: stack vertically */
    @media (max-width: 640px) {
      #lightbox { padding: 0; align-items: flex-end; }
      #lightbox-panel {
        flex-direction: column;
        max-width: 100%;
        width: 100%;
        max-height: 92vh;
        border-radius: 16px 16px 0 0;
      }
      .lb-img-wrap {
        width: 100%;
        min-width: unset;
        max-height: 45vw;
        padding: 1.5rem;
      }
      #lightbox-img { max-height: 38vw; }
      #lightbox-detail { padding: 1.5rem 1.25rem 2rem; }
    }

    .product-card { cursor: pointer; }
  </style>
</head>

/* ════════════════════════════════════════════════
   STATE & HELPERS
════════════════════════════════════════════════ */
let currentLang = 'en';
function prodKey(lang) { return lang === 'zh-cn' ? 'zh' : lang === 'zh-tw' ? 'tw' : lang; }

/* ════════════════════════════════════════════════
   REVEAL OBSERVER
════════════════════════════════════════════════ */
const revealObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) { entry.target.classList.add('visible'); revealObserver.unobserve(entry.target); }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
function observeReveal(el) { revealObserver.observe(el); }

/* ════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════ */
function renderAll(lang) {
  var lk = prodKey(lang);
  var dict = T[lang] || T['en'];
  var fb = document.getElementById('filter-bar');
  fb.innerHTML = '<button class="filter-btn active" data-series="all">' + (dict['page.all'] || 'All') + '</button>' +
    SERIES.map(function(s) { return '<button class="filter-btn" data-series="' + s.id + '">' + (s.label[lk] || s.label.en) + '</button>'; }).join('');
  var container = document.getElementById('series-container');
  container.innerHTML = '';
  SERIES.forEach(function(s, si) {
    var prods = s.products.map(function(p, pi) {
      var pd = p[lk] || p.en;
      var delay = pi % 3 === 1 ? ' reveal-d1' : pi % 3 === 2 ? ' reveal-d2' : '';
      return '<div class="product-card reveal' + delay + '" data-lb-img="' + p.img + '" data-series-idx="' + si + '" data-prod-idx="' + pi + '">' +
        '<div class="product-img"><img src="' + p.img + '" alt="' + pd.name.replace(/"/g, '&quot;') + '" loading="lazy" onload="if(this.naturalHeight>this.naturalWidth)this.classList.add(\'portrait-img\')"></div>' +
        '<p class="product-name">' + pd.name + '</p>' +
        '<span class="product-size">' + pd.size + '</span>' +
        '<p class="product-desc">' + pd.desc + '</p>' +
        '</div>';
    }).join('');
    var sec = document.createElement('section');
    sec.id = 'series-' + s.id;
    sec.className = 'series-section';
    sec.innerHTML = '<div class="container"><div class="series-header reveal"><div class="series-meta"><p class="series-label">' + (s.label[lk] || s.label.en) + '</p><h2 class="series-name">' + (s.name[lk] || s.name.en) + '</h2></div></div><div class="products-grid">' + prods + '</div></div>';
    container.appendChild(sec);
    sec.querySelectorAll('.reveal').forEach(observeReveal);
  });
}

/* ════════════════════════════════════════════════
   LIGHTBOX
════════════════════════════════════════════════ */
function openLightbox(si, pi, lang) {
  var s = SERIES[si]; var p = s.products[pi]; var lk = prodKey(lang);
  var pd = p[lk] || p.en;
  var detail = p.detail && (p.detail[lk] || p.detail.zh || p.detail.en);
  var dict = T[lang] || T['en'];
  document.getElementById('lightbox-img').src = p.img;
  document.getElementById('lightbox-img').alt = pd.name;
  document.getElementById('lb-series-badge').textContent = s.label[lk] || s.label.en;
  document.getElementById('lb-name').textContent = pd.name;
  document.getElementById('lb-size-tag').textContent = pd.size;
  if (detail) {
    document.getElementById('lb-tagline').textContent = detail.tagline || pd.desc;
    document.getElementById('lb-title-features').textContent = dict['lb.title.features'] || 'Key Features';
    document.getElementById('lb-features').innerHTML = (detail.features || []).map(function(f){return '<li>'+f+'</li>';}).join('');
    document.getElementById('lb-title-ingredients').textContent = dict['lb.title.ingredients'] || 'Core Ingredients';
    document.getElementById('lb-ingredients').innerHTML = (detail.ingredients || []).map(function(i){return '<div class="lb-ing-item"><span class="lb-ing-name">'+i.n+'</span><span class="lb-ing-benefit"> — '+i.b+'</span></div>';}).join('');
    document.getElementById('lb-title-usage').textContent = dict['lb.title.usage'] || 'How to Use';
    document.getElementById('lb-usage').textContent = detail.usage || '';
  } else {
    document.getElementById('lb-tagline').textContent = pd.desc;
    document.getElementById('lb-features').innerHTML = '';
    document.getElementById('lb-ingredients').innerHTML = '';
    document.getElementById('lb-usage').textContent = '';
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

/* ════════════════════════════════════════════════
   I18N
════════════════════════════════════════════════ */
function applyLang(lang) {
  var dict = T[lang]; if (!dict) return;
  document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(dict[k]!==undefined)el.textContent=dict[k];});
  document.querySelectorAll('[data-i18n-html]').forEach(function(el){var k=el.getAttribute('data-i18n-html');if(dict[k]!==undefined)el.innerHTML=dict[k];});
  var htmlLang = {en:'en',ko:'ko','zh-cn':'zh-CN','zh-tw':'zh-TW'};
  document.documentElement.lang = htmlLang[lang] || lang;
  document.querySelectorAll('.footer-lang-bar a').forEach(function(a){a.classList.toggle('active',a.getAttribute('data-lang')===lang);});
  var url = new URL(window.location.href); url.searchParams.set('lang',lang); history.replaceState({},'',url);
}
function switchLang(lang) {
  if (lang===currentLang) return; currentLang=lang;
  document.body.className=document.body.className.replace(/\blang-\S+/g,'').trim()+' lang-'+lang;
  document.querySelectorAll('.lang-btn,.mobile-lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang')===lang);});
  applyLang(lang); renderAll(lang);
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
(function init() {
  var params = new URLSearchParams(window.location.search);
  var urlLang = params.get('lang');
  var nav = navigator.language || 'en';
  var auto = nav.startsWith('zh-TW')||nav.startsWith('zh-HK') ? 'zh-tw' : nav.startsWith('zh') ? 'zh-cn' : nav.startsWith('ko') ? 'ko' : 'en';
  currentLang = urlLang && T[urlLang] ? urlLang : (T[auto] ? auto : 'en');
  document.body.className=document.body.className.replace(/\blang-\S+/g,'').trim()+' lang-'+currentLang;
  document.querySelectorAll('.lang-btn,.mobile-lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang')===currentLang);});
  document.querySelectorAll('[data-lang]').forEach(function(el){el.addEventListener('click',function(e){e.preventDefault();switchLang(el.getAttribute('data-lang'));});});
  applyLang(currentLang); renderAll(currentLang);
  var navEl=document.getElementById('main-nav');
  window.addEventListener('scroll',function(){navEl.classList.toggle('scrolled',window.scrollY>40);},{passive:true});
  var hamburger=document.getElementById('hamburger');
  var mobileMenu=document.getElementById('mobile-menu');
  function closeMenu(){mobileMenu.classList.remove('open');mobileMenu.setAttribute('aria-hidden','true');}
  window.closeMenu=closeMenu;
  hamburger.addEventListener('click',function(){var o=mobileMenu.classList.toggle('open');mobileMenu.setAttribute('aria-hidden',String(!o));});
  document.addEventListener('click',function(e){
    var card=e.target.closest('[data-lb-img][data-series-idx]');
    if(card){openLightbox(parseInt(card.dataset.seriesIdx),parseInt(card.dataset.prodIdx),currentLang);return;}
    var lb=document.getElementById('lightbox');
    if(lb.classList.contains('open')&&!e.target.closest('#lightbox-panel')&&!e.target.closest('#lightbox-close'))closeLightbox();
    if(mobileMenu.classList.contains('open')&&!mobileMenu.contains(e.target)&&!hamburger.contains(e.target))closeMenu();
  });
  document.getElementById('lightbox-close').addEventListener('click',closeLightbox);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();});
  document.getElementById('filter-bar').addEventListener('click',function(e){
    var btn=e.target.closest('.filter-btn'); if(!btn)return;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    var sid=btn.getAttribute('data-series');
    if(sid==='all'){window.scrollTo({top:0,behavior:'smooth'});}
    else{var sec=document.getElementById('series-'+sid);if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});}
  });
}());
