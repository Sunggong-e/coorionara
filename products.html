<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg:      #F8F5F0;
      --bg-soft: #EFE7DC;
      --beige:   #E0D4C3;
      --pink:    #F2D9D0;
      --pink-dk: #E4C5BB;
      --brown:   #8B6F5E;
      --brown-dk:#5A3D2E;
      --dark:    #2C1F14;
      --mid:     #7A6858;
      --gold:    #B8935A;
      --white:   #FDFAF6;
      --sans:    'DM Sans', system-ui, sans-serif;
      --serif-ko:'Noto Serif KR', serif;
      --serif-zh:'Noto Serif SC', 'Noto Serif TC', serif;
      --max:     1320px;
      --nav-h:   68px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    body.lang-ko  { font-family: var(--serif-ko); }
    body.lang-ko  .nav-logo, body.lang-ko .lang-btn,
    body.lang-ko  .btn-primary, body.lang-ko .page-h1,
    body.lang-ko  .series-name, body.lang-ko .filter-btn { font-family: var(--sans); }
    body.lang-zh-cn { font-family: var(--serif-zh); }
    body.lang-zh-cn .nav-logo, body.lang-zh-cn .lang-btn,
    body.lang-zh-cn .btn-primary, body.lang-zh-cn .page-h1,
    body.lang-zh-cn .series-name, body.lang-zh-cn .filter-btn { font-family: var(--sans); }
    body.lang-zh-tw { font-family: 'Noto Serif TC', serif; }
    body.lang-zh-tw .nav-logo, body.lang-zh-tw .lang-btn,
    body.lang-zh-tw .btn-primary, body.lang-zh-tw .page-h1,
    body.lang-zh-tw .series-name, body.lang-zh-tw .filter-btn { font-family: var(--sans); }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200; height: var(--nav-h);
      transition: background .35s, box-shadow .35s;
    }
    nav.scrolled {
      background: rgba(248,245,240,.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 var(--beige);
    }
    .nav-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 2rem;
    }
    .nav-logo {
      font-family: var(--sans); font-size: 13px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--dark);
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; flex: 1; justify-content: center; }
    .nav-links a {
      font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--mid); transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--dark); }
    .lang-switcher {
      display: flex; align-items: center;
      border: 1px solid var(--beige); border-radius: 999px; overflow: hidden;
    }
    .lang-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      letter-spacing: .06em; color: var(--mid); background: transparent;
      border: none; padding: .45rem .9rem; transition: background .18s, color .18s;
    }
    .lang-btn.active { background: var(--dark); color: var(--white); }
    .lang-btn:not(.active):hover { background: var(--bg-soft); color: var(--dark); }
    .nav-hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; padding: 6px; background: none; border: none; width: 38px; height: 38px;
    }
    .nav-hamburger span {
      display: block; height: 1.5px; background: var(--dark); border-radius: 2px;
      transition: transform .3s, opacity .2s; transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 190; background: var(--bg);
      padding: calc(var(--nav-h) + 3rem) clamp(1.5rem,6vw,3rem) 3rem;
      flex-direction: column; justify-content: center; opacity: 0; transition: opacity .3s;
    }
    .mobile-menu.open { opacity: 1; }
    .mobile-menu-links { list-style: none; display: flex; flex-direction: column; gap: 1.8rem; margin-bottom: 3rem; }
    .mobile-menu-links a {
      font-family: var(--sans); font-size: clamp(2rem,8vw,2.8rem); font-weight: 700;
      letter-spacing: -.02em; color: var(--dark); transition: color .2s;
    }
    .mobile-lang-row { display: flex; gap: .75rem; flex-wrap: wrap; }
    .mobile-lang-btn {
      font-family: var(--sans); font-size: 12px; letter-spacing: .08em;
      padding: .55rem 1.2rem; border: 1px solid var(--beige); border-radius: 999px;
      background: transparent; color: var(--mid); transition: background .18s, color .18s, border-color .18s;
    }
    .mobile-lang-btn.active { background: var(--dark); color: var(--white); border-color: var(--dark); }

    /* ── PAGE HERO ── */
    .page-hero {
      padding-top: calc(var(--nav-h) + 4rem);
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--beige);
    }
    .page-kicker {
      font-family: var(--sans); font-size: 10px; letter-spacing: .24em;
      text-transform: uppercase; color: var(--brown); margin-bottom: .8rem;
    }
    .page-h1 {
      font-family: var(--sans); font-size: clamp(2.2rem, 4vw, 3.8rem);
      font-weight: 900; letter-spacing: -.03em; line-height: 1.05; color: var(--dark);
    }
    .page-h1 em { font-style: italic; font-weight: 300; color: var(--brown); }
    .page-sub {
      font-size: .9rem; color: var(--mid); margin-top: 1rem; max-width: 480px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: sticky; top: var(--nav-h); z-index: 100;
      background: rgba(248,245,240,.96); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--beige);
      padding: 0 clamp(1.5rem,5vw,4rem);
    }
    .filter-inner {
      max-width: var(--max); margin: 0 auto;
      display: flex; gap: 0; overflow-x: auto;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .filter-inner::-webkit-scrollbar { display: none; }
    .filter-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; color: var(--mid);
      background: transparent; border: none;
      padding: 1rem 1.4rem; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: color .2s, border-color .2s;
    }
    .filter-btn:hover { color: var(--dark); }
    .filter-btn.active { color: var(--brown); border-bottom-color: var(--brown); }

    /* ── SERIES SECTION ── */
    .series-section { padding: clamp(3.5rem,6vw,6rem) 0; border-bottom: 1px solid var(--beige); }
    .series-section:last-child { border-bottom: none; }
    .series-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: clamp(2rem,4vw,3.5rem); gap: 2rem; }
    .series-meta {}
    .series-label {
      font-family: var(--sans); font-size: 10px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--brown); margin-bottom: .5rem;
    }
    .series-name {
      font-family: var(--sans); font-size: clamp(1.6rem,2.8vw,2.6rem);
      font-weight: 700; letter-spacing: -.02em; line-height: 1.1; color: var(--dark);
    }
    .series-name em { font-style: italic; font-weight: 300; color: var(--brown); }
    .series-count {
      font-family: var(--sans); font-size: 11px; letter-spacing: .08em;
      color: var(--mid); margin-top: .4rem;
    }

    /* ── PRODUCT GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(1rem, 2vw, 1.5rem);
    }
    .product-card { cursor: pointer; }
    .product-img {
      aspect-ratio: 3/4; border-radius: 4px; overflow: hidden;
      margin-bottom: 1rem; background: var(--white);
      transition: box-shadow .3s;
    }
    .product-card:hover .product-img { box-shadow: 0 8px 28px rgba(44,31,20,.1); }
    .product-img img {
      width: 100%; height: 100%; object-fit: contain;
      padding: 14%; display: block;
      transition: transform .4s ease;
    }
    .product-card:hover .product-img img { transform: scale(1.05); }
    /* fallback placeholder if no image */
    .product-img.no-img {
      background: linear-gradient(145deg, var(--bg-soft) 0%, var(--pink) 100%);
    }
    .product-name {
      font-size: .9rem; font-weight: 600; color: var(--dark);
      line-height: 1.35; margin-bottom: .3rem;
    }
    .product-cn {
      font-size: 11.5px; color: var(--mid); margin-bottom: .4rem;
    }
    .product-desc {
      font-size: 11.5px; color: var(--mid); line-height: 1.65;
    }
    .product-size {
      display: inline-block; font-family: var(--sans); font-size: 10px;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--brown); border: 1px solid var(--beige);
      padding: .2rem .65rem; border-radius: 999px; margin-top: .5rem;
    }

    /* ── BACK LINK ── */
    .back-bar { padding: 2rem 0; border-top: 1px solid var(--beige); margin-top: 2rem; }
    .back-link {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--sans); font-size: 11.5px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--mid);
      border-bottom: 1px solid var(--beige); padding-bottom: 2px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--dark); }

    /* ── FOOTER ── */
    footer {
      background: var(--dark); color: rgba(248,245,240,.48);
      padding: clamp(2.5rem,5vw,4rem) 0 1.5rem;
    }
    .footer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
      font-family: var(--sans); font-size: 11px;
    }
    .footer-lang-bar { display: flex; gap: 1.5rem; }
    .footer-lang-bar a { font-size: 11px; color: rgba(248,245,240,.38); transition: color .2s; }
    .footer-lang-bar a:hover, .footer-lang-bar a.active { color: var(--gold); }
    .footer-logo-wrap { margin-bottom: 1.5rem; }
    .footer-logo {
      font-family: var(--sans); font-size: 13px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--white);
    }
    .footer-tagline { font-style: italic; font-size: .85rem; color: var(--gold); margin-top: .3rem; }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .55s ease, transform .55s ease; will-change: opacity, transform; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: .08s; }
    .reveal-d2 { transition-delay: .16s; }
    .reveal-d3 { transition-delay: .24s; }

    /* ── LANG SWITCH ── */
    [data-i18n], [data-i18n-html] { transition: opacity .15s; }
    body.lang-switching [data-i18n], body.lang-switching [data-i18n-html] { opacity: 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .products-grid { grid-template-columns: repeat(3, 1fr); }
      .nav-links, .lang-switcher { display: none; }
      .nav-hamburger { display: flex; }
    }
    @media (max-width: 768px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-btn { padding: .85rem 1rem; font-size: 10px; }
      .series-header { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: .75rem; }
    }
  </style>
</head>

    'nav.story':'品牌故事','nav.products':'產品','nav.ingredients':'成分','nav.news':'動態','nav.contact':'聯絡我們',
    'page.kicker':'珂莉安 · COORIONARA',
    'page.h1':'全部<em>產品</em>',
    'page.sub':'8個系列 · 26款產品 · 韓國精製。',
    'page.back':'← 返回首頁',
    'footer.tagline':'"以少勝多的藝術。"',
    'footer.copy':'© 2026 珂莉安 COORIONARA. 版權所有。',
    'footer.lang.en':'English','footer.lang.ko':'한국어','footer.lang.zh-cn':'简体中文','footer.lang.zh-tw':'繁體中文',
  },
};

/* ════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════ */
function getLang(s, lang) {
  if (lang === 'ko') return s.ko;
  if (lang === 'zh-cn') return s.zh;
  if (lang === 'zh-tw') return s.tw;
  return s.en;
}

function renderAll(lang) {
  const bar = document.getElementById('filter-bar');
  const container = document.getElementById('series-container');
  bar.innerHTML = '';
  container.innerHTML = '';

  SERIES.forEach((series, si) => {
    // Filter button
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (si === 0 ? ' active' : '');
    btn.textContent = getLang({ en: series.label.en, ko: series.label.ko, zh: series.label.zh, tw: series.label.tw }, lang);
    btn.addEventListener('click', () => {
      document.getElementById('series-' + series.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    bar.appendChild(btn);

    // Series section
    const section = document.createElement('div');
    section.className = 'series-section reveal';
    section.id = 'series-' + series.id;

    const nameHtml = getLang({ en: series.name.en, ko: series.name.ko, zh: series.name.zh, tw: series.name.tw }, lang);
    const labelTxt = getLang({ en: series.label.en, ko: series.label.ko, zh: series.label.zh, tw: series.label.tw }, lang);
    const countTxt = series.products.length + (lang === 'ko' ? '개 제품' : lang === 'zh-cn' ? '款产品' : lang === 'zh-tw' ? '款產品' : ' products');

    section.innerHTML = `
      <div class="series-header">
        <div class="series-meta">
          <p class="series-label">${labelTxt}</p>
          <h2 class="series-name">${nameHtml}</h2>
          <p class="series-count">${countTxt}</p>
        </div>
      </div>
      <div class="products-grid">${series.products.map((p, pi) => {
        const info = getLang(p, lang);
        return `
          <div class="product-card reveal reveal-d${(pi % 4) + 0}" style="transition-delay:${pi * 0.07}s">
            <div class="product-img">
              <img src="${p.img}" alt="${info.name}" loading="lazy"
                   onerror="this.parentElement.classList.add('no-img'); this.style.display='none'" />
            </div>
            <p class="product-name">${info.name}</p>
            <p class="product-desc">${info.desc}</p>
            <span class="product-size">${info.size}</span>
          </div>`;
      }).join('')}</div>`;
    container.appendChild(section);
  });

  // Re-observe new elements
  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

  // Update active filter on scroll
  setupScrollSpy();
}

/* ════════════════════════════════════════════════
   I18N
════════════════════════════════════════════════ */
let currentLang = 'en';

function applyLang(lang) {
  const dict = T[lang];
  if (!dict) return;
  document.body.classList.add('lang-switching');
  setTimeout(() => {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (dict[k] !== undefined) el.textContent = dict[k];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const k = el.getAttribute('data-i18n-html');
      if (dict[k] !== undefined) el.innerHTML = dict[k];
    });
    document.documentElement.lang = { en:'en', ko:'ko', 'zh-cn':'zh-CN', 'zh-tw':'zh-TW' }[lang] || lang;
    document.querySelectorAll('.footer-lang-bar a').forEach(a =>
      a.classList.toggle('active', a.getAttribute('data-lang') === lang));
    document.body.classList.remove('lang-switching');
  }, 150);
}

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  document.body.className = document.body.className.replace(/\blang-\S+/g, '').trim() + ' lang-' + lang;
  document.querySelectorAll('.lang-btn, .mobile-lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  applyLang(lang);
  renderAll(lang);
  const url = new URL(window.location);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url);
}

document.querySelectorAll('.lang-btn, .mobile-lang-btn').forEach(btn =>
  btn.addEventListener('click', () => switchLang(btn.getAttribute('data-lang'))));
document.querySelectorAll('.footer-lang-bar a').forEach(a =>
  a.addEventListener('click', e => { e.preventDefault(); switchLang(a.getAttribute('data-lang')); }));

/* ════════════════════════════════════════════════
   REVEAL
════════════════════════════════════════════════ */
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

/* ════════════════════════════════════════════════
   NAV SCROLL
════════════════════════════════════════════════ */
const mainNav = document.getElementById('main-nav');
window.addEventListener('scroll', () => mainNav.classList.toggle('scrolled', scrollY > 20), { passive: true });

/* ════════════════════════════════════════════════
   SCROLL SPY
════════════════════════════════════════════════ */
function setupScrollSpy() {
  const sectionEls = SERIES.map(s => document.getElementById('series-' + s.id)).filter(Boolean);
  const filterBtns = document.querySelectorAll('.filter-btn');
  const spy = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = sectionEls.indexOf(entry.target);
        if (idx >= 0) {
          filterBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
        }
      }
    });
  }, { threshold: 0.3, rootMargin: '-20% 0px -60% 0px' });
  sectionEls.forEach(el => spy.observe(el));
}

/* ════════════════════════════════════════════════
   MOBILE MENU
════════════════════════════════════════════════ */
const hamburger  = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobile-menu');
function closeMenu() {
  hamburger.classList.remove('open');
  mobileMenu.classList.remove('open');
  setTimeout(() => { mobileMenu.style.display = 'none'; }, 300);
  mobileMenu.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
hamburger.addEventListener('click', () => {
  const isOpen = hamburger.classList.toggle('open');
  if (isOpen) {
    mobileMenu.style.display = 'flex';
    requestAnimationFrame(() => mobileMenu.classList.add('open'));
    mobileMenu.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  } else closeMenu();
});

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
(function init() {
  const urlLang = new URLSearchParams(location.search).get('lang');
  let lang = (urlLang && T[urlLang]) ? urlLang : 'en';
  currentLang = lang;
  document.body.classList.add('lang-' + lang);
  document.querySelectorAll('.lang-btn, .mobile-lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  applyLang(lang);
  renderAll(lang);
})();
</script>
</body>
</html>
