<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COORIONARA 珂莉安 — Company News</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #F8F5F0;
    --bg-soft:  #EFE7DC;
    --beige:    #E0D4C3;
    --pink:     #F2D9D0;
    --brown:    #8B6F5E;
    --brown-dk: #5A3D2E;
    --dark:     #2C1F14;
    --mid:      #7A6858;
    --gold:     #B8935A;
    --white:    #FDFAF6;

    --sans:     'DM Sans', system-ui, sans-serif;
    --serif-ko: 'Noto Serif KR', serif;
    --serif-zh: 'Noto Serif SC', 'Noto Serif TC', serif;
    --max: 1320px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--dark);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  body.lang-ko  { font-family: var(--serif-ko); }
  body.lang-zh-cn, body.lang-zh-tw { font-family: var(--serif-zh); }
  body.lang-ko  .page-title,
  body.lang-zh-cn .page-title,
  body.lang-zh-tw .page-title { font-weight: 500; }

  .container { max-width: var(--max); margin: 0 auto; padding: 0 clamp(1.25rem, 4vw, 3rem); }

  /* ── Top bar ── */
  header.topbar {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--beige);
  }
  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .brand-logo {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: var(--dark);
    text-decoration: none;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 12.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--mid);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-link:hover { color: var(--dark); border-color: var(--beige); }
  .lang-switch { display: inline-flex; gap: 0.4rem; }
  .lang-btn {
    appearance: none;
    border: 1px solid var(--beige);
    background: transparent;
    border-radius: 999px;
    padding: 5px 14px;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--mid);
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .lang-btn.active, .lang-btn:hover { background: var(--dark); color: var(--white); border-color: var(--dark); }

  /* ── Page header ── */
  .page-head {
    padding: clamp(3.5rem, 7vw, 6rem) 0 clamp(2.5rem, 5vw, 4rem);
  }
  .page-kicker {
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--brown);
    margin-bottom: 0.85rem;
  }
  .page-title {
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--dark);
  }
  .page-title em { font-style: italic; font-weight: 300; color: var(--brown); }

  /* ── News grid ── */
  main { padding-bottom: clamp(4rem, 8vw, 7rem); }
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.75rem;
    align-items: start;
  }
  .news-card {
    background: var(--white);
    border: 1px solid var(--beige);
    border-radius: 6px;
    padding: 1.1rem 1.1rem 1.4rem;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .news-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(44,31,20,0.08); }
  .news-card-img > .ph, .news-card-img > img {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 3px;
    margin-bottom: 1.1rem;
    object-fit: cover;
    display: block;
    background: var(--bg-soft);
  }
  .news-card--featured { grid-column: span 2; }
  .news-card--featured .news-card-img > .ph,
  .news-card--featured .news-card-img > img { aspect-ratio: 21/9; }
  .ph { display: flex; align-items: center; justify-content: center; }
  .ph-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); }
  .news-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.65rem; }
  .news-cat {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brown);
  }
  .news-date { font-size: 11px; color: var(--mid); }
  .news-title {
    font-size: 1rem;
    font-weight: 500;
    color: var(--dark);
    line-height: 1.42;
    margin-bottom: 0.55rem;
  }
  .news-card--featured .news-title { font-size: clamp(1.15rem, 1.8vw, 1.5rem); }
  .news-excerpt { font-size: 0.87rem; color: var(--mid); line-height: 1.78; }
  .news-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--mid);
    font-size: 0.95rem;
  }

  @media (max-width: 700px) {
    .news-grid { grid-template-columns: 1fr; }
    .news-card--featured { grid-column: span 1; }
  }

  footer {
    border-top: 1px solid var(--beige);
    padding: 2rem 0;
    text-align: center;
    color: var(--mid);
    font-size: 12px;
  }
</style>
</head>
<body class="lang-en">

<header class="topbar">
  <div class="container topbar-inner">
    <a href="index.html" class="brand-logo" data-i18n="logo">珂莉安 COORIONARA</a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="ko" onclick="switchLang('ko')">KO</button>
      <button class="lang-btn" data-lang="zh-cn" onclick="switchLang('zh-cn')">简</button>
      <button class="lang-btn" data-lang="zh-tw" onclick="switchLang('zh-tw')">繁</button>
    </div>
    <a href="index.html#news" class="back-link" data-i18n="back">← Back to home</a>
  </div>
</header>

<div class="page-head">
  <div class="container">
    <p class="page-kicker" data-i18n="kicker">Company News</p>
    <h1 class="page-title" data-i18n-html="title">All <em>Updates</em></h1>
  </div>
</div>

<main class="container">
  <div class="news-grid" id="news-grid">
    <p class="news-empty" data-i18n="loading">Loading news…</p>
  </div>
</main>

<footer>
  <div class="container">
    <span>© 2026 COORIONARA. All rights reserved.</span>
  </div>
</footer>

<!-- News data — loaded as a plain <script> (not fetch) so it also
     works when this file is opened directly via file:// (double-click) -->
<script src="news-data.js"></script>
<script>
  const T = {
    en:    { logo: 'COORIONARA', back: '← Back to home', kicker: 'Company News', title: 'All <em>Updates</em>', loading: 'Loading news…', empty: 'No news yet — check back soon.' },
    ko:    { logo: '珂莉안 COORIONARA', back: '← 홈으로 돌아가기', kicker: '회사 소식', title: '전체 <em>소식</em>', loading: '소식을 불러오는 중…', empty: '등록된 소식이 아직 없습니다.' },
    'zh-cn': { logo: '珂莉안 COORIONARA', back: '← 返回首页', kicker: '公司动态', title: '全部<em>动态</em>', loading: '正在加载…', empty: '暂无最新动态，敬请期待。' },
    'zh-tw': { logo: '珂莉안 COORIONARA', back: '← 返回首頁', kicker: '公司動態', title: '全部<em>動態</em>', loading: '正在載入…', empty: '暫無最新動態，敬請期待。' },
  };

  const NEWS_LANG_FIELD = { en: 'en', ko: 'ko', 'zh-cn': 'zh', 'zh-tw': 'zh_tw' };
  const NEWS_MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let currentLang = 'en';
  let newsItems = null;

  function detectLang() {
    const urlLang = new URL(window.location).searchParams.get('lang');
    if (urlLang && T[urlLang]) return urlLang;
    const nav = (navigator.language || 'en').toLowerCase();
    if (nav.startsWith('ko')) return 'ko';
    if (nav.startsWith('zh-tw') || nav.startsWith('zh-hk')) return 'zh-tw';
    if (nav.startsWith('zh')) return 'zh-cn';
    return 'en';
  }

  function applyLang(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (T[lang][key]) el.textContent = T[lang][key];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (T[lang][key]) el.innerHTML = T[lang][key];
    });
    document.body.className = document.body.className.replace(/\blang-\S+/g, '').trim() + ' lang-' + lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === lang));
    document.documentElement.lang = lang;
  }

  function switchLang(lang) {
    currentLang = lang;
    applyLang(lang);
    renderNews(lang);
    const url = new URL(window.location);
    url.searchParams.set('lang', lang);
    history.replaceState({}, '', url);
  }

  function formatNewsDate(dateStr, lang) {
    const parts = (dateStr || '').split('-').map(Number);
    const y = parts[0], m = parts[1];
    if (!y || !m) return dateStr || '';
    if (lang === 'ko') return `${y}년 ${m}월`;
    if (lang === 'zh-cn' || lang === 'zh-tw') return `${y}年${m}月`;
    return `${NEWS_MONTHS_EN[m - 1]} ${y}`;
  }

  function handleNewsImgError(img) {
    const ph = document.createElement('div');
    ph.className = 'ph';
    ph.innerHTML = '<span class="ph-label">Image</span>';
    img.replaceWith(ph);
  }
  window.handleNewsImgError = handleNewsImgError;

  function newsCardHTML(item, lang) {
    const f = NEWS_LANG_FIELD[lang] || 'en';
    const cat     = item['category_' + f] || item.category_en || '';
    const title   = item['title_' + f]    || item.title_en    || '';
    const summary = item['summary_' + f]  || item.summary_en  || '';
    const dateLabel = formatNewsDate(item.date, lang);
    const isFeatured = !!item.featured;
    const imgHTML = item.thumbnail
      ? `<img src="${item.thumbnail}" alt="" loading="lazy" onerror="handleNewsImgError(this)">`
      : `<div class="ph"><span class="ph-label">Image</span></div>`;
    const href = item.link && item.link !== '#' ? item.link : null;
    const Tag = href ? 'a' : 'div';
    const hrefAttr = href ? ` href="${href}" target="_blank" rel="noopener"` : '';
    return `
      <${Tag} class="news-card${isFeatured ? ' news-card--featured' : ''}"${hrefAttr}>
        <div class="news-card-img">${imgHTML}</div>
        <div class="news-meta">
          <span class="news-cat">${cat}</span>
          <span class="news-date">${dateLabel}</span>
        </div>
        <h3 class="news-title">${title}</h3>
        <p class="news-excerpt">${summary}</p>
      </${Tag}>`;
  }

  function renderNews(lang) {
    const grid = document.getElementById('news-grid');
    if (!grid) return;
    if (!newsItems || !newsItems.length) {
      grid.innerHTML = `<p class="news-empty">${T[lang].empty}</p>`;
      return;
    }
    const sorted = [...newsItems].sort((a, b) => {
      if (!!a.featured !== !!b.featured) return a.featured ? -1 : 1;
      return new Date(b.date) - new Date(a.date);
    });
    grid.innerHTML = sorted.map(item => newsCardHTML(item, lang)).join('');
  }

  function loadNews(lang) {
    // news-data.js is loaded via a plain <script> tag (see just above this
    // <script> block), so it works whether the page is opened via file://
    // (double-click) or http(s) — no fetch() / CORS restriction involved.
    newsItems = Array.isArray(window.NEWS_DATA) ? window.NEWS_DATA : [];
    if (!newsItems.length) {
      console.warn('[news] window.NEWS_DATA is empty or missing — check that news-data.js is present and loaded before this script.');
    }
    renderNews(lang);
  }

  currentLang = detectLang();
  applyLang(currentLang);
  loadNews(currentLang);
</script>

</body>
</html>
